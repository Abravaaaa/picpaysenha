<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Itaú | Segurança</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        
        :root {
            --itau-orange: #EC7000;
            --itau-blue: #003399;
            --itau-gray: #5E6E79;
        }

        body, html {
            height: 100%;
            margin: 0;
            background-color: white;
            font-family: 'Roboto', sans-serif;
            color: #333;
            overflow: hidden;
        }

        .app-header {
            height: 60px;
            background-color: var(--itau-blue);
            color: white;
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-weight: 500;
        }

        .pin-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 280px;
            margin-top: 40px;
        }

        .pin-field {
            aspect-ratio: 1 / 1;
            border: 1px solid #CCC;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--itau-blue);
            background: #F4F4F4;
        }

        .pin-field.active {
            border-color: var(--itau-orange);
            background: white;
            box-shadow: 0 0 0 2px rgba(236, 112, 0, 0.2);
        }

        #real-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .btn-itau {
            background-color: var(--itau-orange);
            color: white;
            font-weight: 700;
            padding: 16px;
            border-radius: 4px;
            width: 100%;
            transition: opacity 0.2s;
        }

        .btn-itau:disabled {
            opacity: 0.5;
        }
    </style>
</head>
<body onclick="document.getElementById('real-input').focus()">

    <div class="flex flex-col h-screen">
        <header class="app-header">
            <i data-lucide="chevron-left" class="mr-4"></i>
            <span class="text-lg">Itaú segurança</span>
        </header>

        <main class="flex-1 px-8 pt-12 flex flex-col items-center">
            <h1 class="text-2xl font-bold text-gray-800 text-center">Senha eletrônica</h1>
            <p class="text-center text-gray-600 mt-4">
                Digite sua senha de <span class="font-bold">6 dígitos</span>
            </p>

            <div class="pin-container" id="pin-display">
                <div class="pin-field"></div>
                <div class="pin-field"></div>
                <div class="pin-field"></div>
                <div class="pin-field"></div>
                <div class="pin-field"></div>
                <div class="pin-field"></div>
            </div>

            <input 
                type="text" 
                id="real-input" 
                maxlength="6" 
                inputmode="numeric" 
                pattern="[0-9]*"
                autocomplete="off"
                autofocus
            >
        </main>

        <footer class="p-8">
            <button id="btn-confirm" disabled class="btn-itau">
                Confirmar
            </button>
            <div class="text-center mt-6 text-sm text-[#003399] font-medium">
                Esqueci minha senha
            </div>
        </footer>
    </div>

    <script>
        lucide.createIcons();

        const realInput = document.getElementById('real-input');
        const pinFields = document.querySelectorAll('.pin-field');
        const btnConfirm = document.getElementById('btn-confirm');

        // Garante o foco inicial
        window.onload = () => realInput.focus();

        realInput.addEventListener('input', (e) => {
            // Remove qualquer caractere que não seja número
            const val = e.target.value.replace(/[^0-9]/g, '');
            e.target.value = val;
            
            pinFields.forEach((field, i) => {
                if (i < val.length) {
                    field.textContent = val[i]; // Senha Visível
                    field.classList.remove('active');
                } else {
                    field.textContent = '';
                    if (i === val.length) {
                        field.classList.add('active');
                    } else {
                        field.classList.remove('active');
                    }
                }
            });

            btnConfirm.disabled = (val.length !== 6);
        });

        // Impede que o usuário perca o foco do teclado
        document.body.addEventListener('click', () => realInput.focus());
    </script>
</body>
</html>
